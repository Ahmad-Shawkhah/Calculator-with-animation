<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Calculator App</title>
    <style>
      html { box-sizing: border-box; }
      *, *:before, *:after { box-sizing: inherit; }

      body {
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      h1 {
        font-size: 2.5rem;
        margin-bottom: 60px;
      }

      /* zone is the magnetic hover area — no visible circle */
      .zone {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 220px;
        height: 100px;
      }

      /* pill shaped button */
      .btn-start {
        background-color: #f0a500;
        color: #1a1a1a;
        border: none;
        padding: 16px 44px;
        font-size: 1.1rem;
        font-family: sans-serif;
        font-weight: bold;
        cursor: pointer;
        border-radius: 50px;
      }
    </style>
  </head>
  <body>

    <h1 class="split">Our Best Calculator App in the world</h1>

    <div class="zone">
      <button class="btn-start" onclick="window.location.href='calculator.html'">
        Start
      </button>
    </div>

    <!-- we adding GSAP 3.15 -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>

    <!-- and adding SplitText plugin -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/SplitText.min.js"></script>

    <script src="index.js"></script>

  </body>
</html>
